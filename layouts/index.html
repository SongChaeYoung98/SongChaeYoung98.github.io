{{- define "main" -}}
{{- $posts := where .Site.RegularPages "Section" "posts" -}}
{{- $projects := where .Site.RegularPages "Section" "projects" -}}
{{- $pages := union $posts $projects -}}

<div id="root"></div>
<style>
  .header,
  .footer {
    display: none !important;
  }

  .main {
    max-width: none !important;
    padding: 0 !important;
  }
</style>
<script>
window.__BLOG_DATA__ = {
  posts: [
    {{- range $posts -}}
    {
      title: {{ .Title | jsonify | safeJS }},
      summary: {{ (.Summary | plainify | truncate 180) | jsonify | safeJS }},
      url: {{ .RelPermalink | jsonify | safeJS }},
      section: "post",
      date: {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeJS }},
      dateLabel: {{ .Date.Format "2006.01.02" | jsonify | safeJS }},
      tags: {{ .Params.tags | default slice | jsonify | safeJS }},
      commitHash: {{ if .GitInfo }}{{ .GitInfo.AbbreviatedHash | jsonify | safeJS }}{{ else }}""{{ end }}
    },
    {{- end -}}
  ],
  projects: [
    {{- range $projects -}}
    {
      title: {{ .Title | jsonify | safeJS }},
      summary: {{ (.Summary | plainify | truncate 180) | jsonify | safeJS }},
      url: {{ .RelPermalink | jsonify | safeJS }},
      section: "project",
      date: {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify | safeJS }},
      dateLabel: {{ .Date.Format "2006.01.02" | jsonify | safeJS }},
      tags: {{ .Params.tags | default slice | jsonify | safeJS }},
      commitHash: {{ if .GitInfo }}{{ .GitInfo.AbbreviatedHash | jsonify | safeJS }}{{ else }}""{{ end }}
    },
    {{- end -}}
  ],
  commits: [
    {{- range first 3 $pages -}}
    {
      hash: {{ if .GitInfo }}{{ .GitInfo.AbbreviatedHash | jsonify | safeJS }}{{ else }}"local"{{ end }},
      title: {{ .Title | jsonify | safeJS }},
      url: {{ .RelPermalink | jsonify | safeJS }}
    },
    {{- end -}}
  ]
};
</script>
<script type="module" src="{{ "landing-assets/landing.js" | relURL }}"></script>
<link rel="stylesheet" href="{{ "landing-assets/landing.css" | relURL }}">
{{- end -}}
