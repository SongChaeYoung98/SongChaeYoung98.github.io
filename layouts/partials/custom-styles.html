<style>
/* ════════════════════════════════════════
   DARK THEME (default)
════════════════════════════════════════ */
/* PaperMod sets data-theme on <html>; our JS does the same — both selectors needed */
:root,
html[data-theme="dark"],
[data-theme="dark"] {
  --bg:        #0d0d10;
  --bg-card:   #13131a;
  --bg-card2:  #1a1a24;
  --border:    rgba(124,106,247,0.18);
  --accent:    #7c6af7;
  --accent2:   #5de8c1;
  --accent3:   #f4a942;
  --text:      #e8e8f0;
  --muted:     #6e6e8a;
  --glow:      rgba(124,106,247,0.35);
  --nav-bg:    rgba(13,13,16,0.80);
  --nav-border: rgba(124,106,247,0.18);
  --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(124,106,247,0.18);
  --scrollbar-thumb: rgba(124,106,247,0.28);
  --scrollbar-thumb-h: rgba(124,106,247,0.48);
  --selection-bg: rgba(124,106,247,0.28);
}

/* ════════════════════════════════════════
   LIGHT THEME
════════════════════════════════════════ */
html[data-theme="light"],
[data-theme="light"] {
  --bg:        #f5f5f8;
  --bg-card:   #ffffff;
  --bg-card2:  #f0f0f5;
  --border:    rgba(90,79,208,0.14);
  --accent:    #5a4fd0;
  --accent2:   #1aa88a;
  --accent3:   #d4870e;
  --text:      #18181f;
  --muted:     #6b6b80;
  --glow:      rgba(90,79,208,0.18);
  --nav-bg:    rgba(245,245,248,0.88);
  --nav-border: rgba(90,79,208,0.1);
  --card-hover-shadow: 0 8px 32px rgba(90,79,208,0.10), 0 0 0 1px rgba(90,79,208,0.16);
  --scrollbar-thumb: rgba(90,79,208,0.20);
  --scrollbar-thumb-h: rgba(90,79,208,0.42);
  --selection-bg: rgba(90,79,208,0.18);
}

/* PaperMod 기본값 리셋 */
body { background: var(--bg) !important; color: var(--text) !important; font-family: 'Plus Jakarta Sans', sans-serif !important; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
.main { padding: 0 !important; max-width: none !important; }
header.header { display: none; } /* PaperMod 헤더 숨김 — 아래 커스텀 nav 사용 */
/* PaperMod 내장 theme toggle 중복 방지 */
#theme-toggle-btn { display: none !important; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* Noise texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: radial-gradient(ellipse 100% 70% at 50% 30%, black 10%, transparent 100%);
  pointer-events: none; z-index: 0;
}

::selection { background: var(--selection-bg); color: var(--text); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-h); }

/* ── NAV — PaperMod 완전 제압, specificity 최대화 ── */

/* PaperMod 기본 header/nav 완전 숨김 */
header.header,
.header,
#header { display: none !important; }

/* 커스텀 nav */
nav.custom-nav {
  position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important;
  z-index: 9999 !important;
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  padding: 1rem 2.5rem !important;
  background: var(--nav-bg) !important;
  backdrop-filter: blur(20px) !important;
  -webkit-backdrop-filter: blur(20px) !important;
  border-bottom: 1px solid var(--nav-border) !important;
  transition: background 0.3s, border-color 0.3s;
  box-shadow: none !important;
  height: auto !important; width: 100% !important;
}

/* logo */
nav.custom-nav a.nav-logo {
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 0.85rem !important;
  color: var(--accent2) !important;
  letter-spacing: 0.05em !important;
  text-decoration: none !important;
  transition: opacity 0.2s;
  font-weight: 400 !important;
  background: none !important;
}
nav.custom-nav a.nav-logo:hover { opacity: 0.75 !important; }
nav.custom-nav a.nav-logo span { color: var(--accent) !important; }

/* nav links */
nav.custom-nav ul.nav-links {
  display: flex !important; gap: 2rem !important;
  list-style: none !important; margin: 0 !important; padding: 0 !important;
}
nav.custom-nav ul.nav-links li { margin: 0 !important; padding: 0 !important; }
nav.custom-nav ul.nav-links a {
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 0.78rem !important;
  color: var(--muted) !important;
  text-decoration: none !important;
  letter-spacing: 0.05em !important;
  text-transform: uppercase !important;
  transition: color 0.2s;
  background: none !important;
  border: none !important;
  padding: 0 !important;
}
nav.custom-nav ul.nav-links a:hover { color: var(--text) !important; }
nav.custom-nav ul.nav-links a[aria-current="page"],
nav.custom-nav ul.nav-links a.active { color: var(--accent) !important; }

/* nav right */
nav.custom-nav .nav-right {
  display: flex !important; align-items: center !important; gap: 0.75rem !important;
}

/* search button */
nav.custom-nav button.btn-search {
  background: none !important;
  border: 1px solid var(--border) !important;
  color: var(--muted) !important;
  padding: .4rem .9rem !important;
  border-radius: 6px !important;
  cursor: pointer !important;
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 0.75rem !important;
  transition: all .2s;
  line-height: 1.4 !important;
  box-shadow: none !important;
}
nav.custom-nav button.btn-search:hover {
  border-color: var(--accent) !important;
  color: var(--accent) !important;
  background: none !important;
}

/* theme toggle button */
nav.custom-nav button#theme-toggle {
  background: none !important;
  border: 1px solid var(--border) !important;
  color: var(--muted) !important;
  padding: .38rem .8rem !important;
  border-radius: 6px !important;
  cursor: pointer !important;
  font-size: 0.9rem !important;
  transition: border-color .2s, background .2s, color .2s;
  line-height: 1 !important;
  box-shadow: none !important;
  font-family: inherit !important;
}
nav.custom-nav button#theme-toggle:hover {
  border-color: var(--accent) !important;
  color: var(--accent) !important;
  background: rgba(124,106,247,0.06) !important;
}

/* ── HERO ── */
.hero {
  position: relative; min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 8rem 2.5rem 4rem; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 60%, rgba(124,106,247,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 20%, rgba(93,232,193,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 80%, rgba(244,169,66,0.07) 0%, transparent 60%);
  transition: background 0.3s;
}
[data-theme="light"] .hero-bg {
  background:
    radial-gradient(ellipse 60% 50% at 15% 60%, rgba(90,79,208,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 20%, rgba(26,168,138,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 80%, rgba(212,135,14,0.05) 0%, transparent 60%);
}
.hero-grid {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* hero-inner: 넓은 화면 기준 간격 유지, 터미널 없을 때 중앙 정렬 */
.hero-inner {
  position: relative; z-index: 1;
  width: 100%; max-width: 1200px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 3rem;
}
.hero-content {
  flex: 1;
  max-width: 640px;
}

.hero-label {
  display: inline-flex; align-items: center; gap: .5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.12em; color: var(--accent2);
  background: rgba(93,232,193,0.08); border: 1px solid rgba(93,232,193,0.2);
  padding: .3rem .8rem; border-radius: 99px; margin-bottom: 1.8rem;
  animation: fadeUp .6s ease both;
}
[data-theme="light"] .hero-label { background: rgba(26,168,138,0.07); border-color: rgba(26,168,138,0.22); }
.hero-label::before { content: '▶'; font-size: .55rem; }
.hero-title {
  font-size: clamp(2.2rem, 4.5vw, 4.2rem); font-weight: 800;
  line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 1.5rem;
  animation: fadeUp .6s .1s ease both;
}
.hero-title .line2 {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #f4a942 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-desc {
  font-size: 0.98rem; color: var(--muted); line-height: 1.75;
  max-width: 460px; margin-bottom: 2.5rem;
  animation: fadeUp .6s .2s ease both;
  font-weight: 400; font-family: 'JetBrains Mono', monospace;
}
.hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; animation: fadeUp .6s .3s ease both; }
.btn-primary {
  display: inline-flex; align-items: center; gap: .5rem;
  background: var(--accent); color: #fff; font-weight: 700; font-size: .9rem;
  padding: .75rem 1.75rem; border-radius: 8px;
  text-decoration: none; border: none; cursor: pointer;
  transition: all .25s; box-shadow: 0 0 28px var(--glow);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 44px var(--glow); transform: translateY(-2px); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: .5rem;
  background: transparent; color: var(--text); font-weight: 600; font-size: .9rem;
  padding: .75rem 1.75rem; border-radius: 8px;
  text-decoration: none; border: 1px solid var(--border);
  cursor: pointer; transition: all .25s; font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── STATS STRIP ── */
.stats-strip {
  position: relative; z-index: 1;
  display: flex; gap: 0; margin-top: 3.5rem;
  border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  animation: fadeUp .6s .4s ease both; max-width: 440px;
  transition: border-color 0.3s;
}
.stat-item {
  flex: 1; padding: 1rem 1.25rem;
  border-right: 1px solid var(--border); background: var(--bg-card);
  transition: background 0.3s, border-color 0.3s;
}
.stat-item:last-child { border-right: none; }
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1;
}
.stat-label {
  font-size: .65rem; color: var(--muted); letter-spacing: .06em;
  margin-top: .3rem; text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}

/* ── HERO TERMINAL ── */
.hero-terminal {
  flex-shrink: 0; width: 340px; z-index: 2;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,106,247,0.1);
  animation: floatIn .8s .4s ease both, float 5s 1.5s ease-in-out infinite;
  transition: background 0.3s, border-color 0.3s;
}
[data-theme="light"] .hero-terminal { box-shadow: 0 16px 60px rgba(90,79,208,0.12), 0 0 0 1px rgba(90,79,208,0.12); }
.terminal-bar {
  display: flex; align-items: center; gap: .5rem;
  padding: .7rem 1rem;
  background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border);
}
[data-theme="light"] .terminal-bar { background: rgba(0,0,0,0.02); }
.terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
.terminal-dot.r { background: #ff5f57; }
.terminal-dot.y { background: #febc2e; }
.terminal-dot.g { background: #28c840; }
.terminal-title { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--muted); margin-left: auto; }
.terminal-body {
  padding: 1.2rem 1.2rem 1.5rem;
  font-family: 'JetBrains Mono', monospace; font-size: .78rem; line-height: 1.8;
}
.t-prompt { color: var(--accent2); }
.t-cmd    { color: var(--text); }
.t-out    { color: var(--muted); padding-left: 1rem; }
.t-badge  { display: inline-block; padding: .1rem .5rem; border-radius: 4px; font-size: .7rem; font-weight: 700; }
.t-badge.project { background: rgba(124,106,247,0.2); color: var(--accent); }
.t-badge.devlog  { background: rgba(93,232,193,0.2);  color: var(--accent2); }
.t-badge.arch    { background: rgba(244,169,66,0.2);  color: var(--accent3); }
.t-badge.default { background: rgba(255,255,255,0.08); color: var(--muted); }
.t-cursor {
  display: inline-block; width: 8px; height: 1em;
  background: var(--accent2); vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}

/* ── TERMINAL LINKS — blog.sh 클릭 가능 항목 ── */
.t-link {
  text-decoration: none; color: inherit;
  display: block; border-radius: 4px;
  margin: 0 -.4rem; padding: 0 .4rem;
  transition: background .15s;
}
.t-link:hover { background: rgba(124,106,247,0.12); }
[data-theme="light"] .t-link:hover { background: rgba(90,79,208,0.08); }
.t-link:hover .t-out { color: var(--text); }

/* ── CONTAINER ── */
.container { max-width: 1120px; margin: 0 auto; padding: 0 2.5rem; }
section { position: relative; z-index: 1; }
.posts-section { padding: 5rem 0 6rem; }
.section-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 2rem;
}
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: .7rem; letter-spacing: .12em;
  color: var(--accent); text-transform: uppercase; margin-bottom: .4rem;
}
.section-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.015em; color: var(--text); }
.view-all {
  font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--muted);
  text-decoration: none; display: flex; align-items: center; gap: .3rem;
  transition: color .2s; padding-bottom: .2rem;
}
.view-all:hover { color: var(--accent); }
.view-all::after { content: '→'; }

/* ── FILTER TABS ── */
.filter-tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 2rem; }
.tab {
  font-family: 'JetBrains Mono', monospace; font-size: .75rem;
  padding: .4rem 1rem; border-radius: 6px; border: 1px solid var(--border);
  background: none; color: var(--muted); cursor: pointer;
  transition: all .2s; letter-spacing: .04em;
}
.tab:hover  { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── POST CARDS ── */
.posts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.25rem;
}
.post-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
  transition: border-color .25s, transform .25s, box-shadow .25s, background .3s;
  position: relative; overflow: hidden; min-width: 0;
}
.post-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(124,106,247,0.06) 0%, transparent 60%);
  opacity: 0; transition: opacity .3s;
}
[data-theme="light"] .post-card::before {
  background: linear-gradient(135deg, rgba(90,79,208,0.04) 0%, transparent 60%);
}
.post-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--card-hover-shadow); }
.post-card:hover::before { opacity: 1; }
.card-badge {
  display: inline-flex; align-items: center; gap: .35rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem; font-weight: 700; letter-spacing: .1em;
  padding: .2rem .6rem; border-radius: 4px; margin-bottom: 1rem;
  width: fit-content; text-transform: uppercase; white-space: nowrap;
}
.badge-project      { background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
.badge-devlog       { background: rgba(93,232,193,0.12);  color: var(--accent2); border: 1px solid rgba(93,232,193,0.25); }
.badge-architecture { background: rgba(244,169,66,0.12);  color: var(--accent3); border: 1px solid rgba(244,169,66,0.25); }
.badge-default      { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
[data-theme="light"] .badge-default { background: rgba(0,0,0,0.04); }
.card-title {
  font-size: 1rem; font-weight: 700; margin-bottom: .5rem;
  line-height: 1.4; letter-spacing: -.01em; color: var(--text);
  word-break: keep-all; overflow-wrap: break-word; white-space: normal; min-width: 0;
}
.card-desc {
  font-size: .8rem; color: var(--muted); line-height: 1.65; flex: 1;
  margin-bottom: 1.2rem; font-family: 'JetBrains Mono', monospace; font-weight: 300;
  word-break: keep-all; overflow-wrap: break-word; min-width: 0;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: var(--muted); min-width: 0;
}
.card-tags { display: flex; gap: .4rem; flex-wrap: wrap; flex: 1; min-width: 0; }
.card-tag {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  color: var(--muted); padding: .1rem .45rem; border-radius: 3px;
  font-size: .63rem; font-family: 'JetBrains Mono', monospace;
  transition: background 0.3s, border-color 0.3s; white-space: nowrap;
}
[data-theme="light"] .card-tag { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
.card-arrow {
  color: var(--accent); font-size: .9rem;
  opacity: 0; transform: translateX(-4px);
  transition: all .2s; flex-shrink: 0;
}
.post-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

/* ── FEATURED ── */
.post-card.featured {
  grid-column: 1 / -1;
  flex-direction: row; align-items: flex-start; gap: 2rem; padding: 2rem;
}
.featured-left { flex: 1; min-width: 0; }
.featured-right {
  width: 160px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: flex-end; gap: .75rem;
}
.featured-label {
  font-family: 'JetBrains Mono', monospace; font-size: .65rem; letter-spacing: .12em;
  color: var(--accent2); text-transform: uppercase;
  border: 1px solid rgba(93,232,193,.2); background: rgba(93,232,193,.07);
  padding: .2rem .6rem; border-radius: 4px; width: fit-content;
}
[data-theme="light"] .featured-label { background: rgba(26,168,138,0.07); border-color: rgba(26,168,138,0.22); }
.featured .card-title { font-size: 1.25rem; word-break: keep-all; overflow-wrap: break-word; }

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 5rem 0;
  color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: .85rem; line-height: 2;
}
.empty-state .big { font-size: 2.5rem; margin-bottom: 1rem; }

/* ── PAGE WRAPPERS (Posts / Projects / Tags 서브페이지) ── */
/* Hugo 실제 list 레이아웃 파일(layouts/posts/list.html 등)에서도 이 CSS를 재사용 */
.page-wrapper {
  display: none;
  padding-top: 5rem;
  min-height: 100vh;
}
.page-wrapper.active { display: block; }
#home-page { display: block; } /* 홈은 항상 block — Hugo가 직접 렌더 */

/* Hugo list/taxonomy 페이지 공통 헤더 */
.page-header {
  padding: 3.5rem 0 2.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3rem;
  position: relative;
}
.page-header .section-label { margin-bottom: .5rem; }
.page-header h1 {
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 800; letter-spacing: -0.02em; color: var(--text); line-height: 1.15;
}
.page-header p {
  font-family: 'JetBrains Mono', monospace;
