<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --theme: #000;
    --entry: rgba(255, 255, 255, 0.055);
    --primary: #fff;
    --secondary: rgba(255, 255, 255, 0.72);
    --tertiary: rgba(255, 255, 255, 0.46);
    --content: rgba(255, 255, 255, 0.84);
    --hljs-bg: #101014;
    --code-bg: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.16);
    --radius: 16px;
  }

  html,
  body {
    background: #000 !important;
    color: #fff !important;
    font-family: "Barlow", sans-serif;
  }

  .main {
    max-width: 1120px;
  }

  body:not(.list):not(.post-single) .main:has(#root) {
    max-width: none;
    padding: 0;
  }

  .logo a,
  .post-title,
  .page-header h1 {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    letter-spacing: 0;
  }

  .header {
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .nav a {
    font-family: "Barlow", sans-serif;
    font-weight: 500;
  }

  .post-entry,
  .terms-tags a,
  .archive-entry {
    background: rgba(255, 255, 255, 0.045);
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: 16px;
    backdrop-filter: blur(16px);
  }

  .post-entry:hover {
    border-color: rgba(255, 255, 255, 0.32);
  }

  .post-content {
    font-family: "Barlow", sans-serif;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.82);
  }

  .post-content h1,
  .post-content h2,
  .post-content h3 {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    color: #fff;
  }

  .post-content a {
    color: #a9f6ff;
    text-decoration-color: rgba(169, 246, 255, 0.4);
    text-underline-offset: 3px;
  }

  .post-content pre,
  .post-content code {
    border: 1px solid rgba(255, 255, 255, 0.11);
  }

  .top-link.top-link-orb {

    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 999;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    background:
      radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.16), transparent 34%),

      rgba(10, 14, 20, 0.3);

      0 20px 54px rgba(0, 0, 0, 0.34),
      inset 0 1px 0 rgba(255, 255, 255, 0.14);
    color: rgba(255, 255, 255, 0.94);

    -webkit-backdrop-filter: blur(18px) saturate(135%);

    transform: translate3d(0, 20px, 0) scale(0.98);
    transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease, opacity 0.24s ease;
  }

  .top-link.top-link-orb::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.22), transparent 28%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.09), transparent 55%);

    pointer-events: none;
  }

  .top-link-glow {
    position: absolute;
    inset: -18px;
    border-radius: inherit;

    opacity: 0.46;
    pointer-events: none;
  }

  .top-link-progress {
    position: absolute;
    inset: -24px;
    border-radius: 999px;
    background: conic-gradient(from -90deg, rgba(168, 247, 255, 0.92) 0turn, rgba(123, 241, 255, 0.78) calc(var(--hugo-top-progress) * 0.34turn), rgba(83, 230, 255, 0.52) calc(var(--hugo-top-progress) * 0.72turn), rgba(83, 230, 255, 0.18) calc(var(--hugo-top-progress) * 1turn), transparent 0);

    pointer-events: none;
    mix-blend-mode: screen;

      inset 0 -10px 18px rgba(102, 214, 255, 0.08),
      0 8px 20px rgba(0, 0, 0, 0.22),
      0 0 18px rgba(150, 242, 255, 0.08);
    transition: transform 0.24s ease, background-color 0.24s ease, box-shadow 0.24s ease;
  }

  .top-link-core::before {
    content: "";
    position: absolute;
    inset: 4px 7px 17px 7px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.08));
    filter: blur(0.4px);
    opacity: 0.95;
    pointer-events: none;
  }

  .top-link-core::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    opacity: 0.7;
    pointer-events: none;
  }

  .top-link-core svg {
    width: 18px;
    height: 18px;
  }

  .top-link.top-link-orb:hover,
  .top-link.top-link-orb:focus-visible {
    transform: translate3d(0, -2px, 0) scale(1);
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow:

      0 0 34px rgba(90, 228, 255, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 0.14);

      inset 0 -10px 18px rgba(102, 214, 255, 0.12),

      0 0 24px rgba(150, 242, 255, 0.12);
  }

  .top-link.top-link-orb:hover .top-link-glow,
  .top-link.top-link-orb:focus-visible .top-link-glow {
    opacity: 0.66;
  }

  .top-link.top-link-orb:focus-visible {
    outline: 2px solid rgba(186, 248, 255, 0.4);
    outline-offset: 3px;
  }

  @media (max-width: 860px) {

      bottom: 16px;
      width: 58px;
      height: 58px;

      height: 42px;
