  layouts/partials/extend_head.html
  PaperMod baseof.html 의 <head> 안에 자동 포함됩니다.
  - Google Fonts 로드
  - 커스텀 nav / search overlay CSS
  - 초기 테마 플리커 방지 스크립트
*/}}

<!-- Google Fonts preload (FOUT 방지) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=block" as="style">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=block" rel="stylesheet">

<!-- 초기 테마 + FOUC 완전 차단 -->
<script>
(function(){
  // 1. 테마 즉시 결정
  var t = localStorage.getItem('theme') || localStorage.getItem('pref-theme') || 'dark';
  var html = document.documentElement;
  html.setAttribute('data-theme', t);

  // 2. body를 숨겨 PaperMod JS 실행 전 어떤 내용도 노출되지 않게 함
  //    DOMContentLoaded 후 한 프레임 뒤 표시 → 완전히 렌더된 상태만 보임
  var s = document.createElement('style');
  s.id = '__fouc_block';
  s.textContent = 'body{visibility:hidden!important;opacity:0!important}';
  document.head.appendChild(s);

  function reveal() {
    var el = document.getElementById('__fouc_block');
    if (el) el.remove();
  }

  function revealWhenReady() {
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(reveal);
    } else {
      reveal();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      requestAnimationFrame(revealWhenReady);
    });
  } else {
    requestAnimationFrame(revealWhenReady);
  }
})();
</script>

<style>
/* ── html 즉시 배경 고정 — body 렌더 전 흰 화면 방지 ── */

  --accent2:   #1aa88a;
  --accent3:   #d4870e;

}

::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* ── SHARED LAYOUT ── */

}

  display: inline-block; width: fit-content;s

/* ── SHARED CARD COMPONENTS ── */
