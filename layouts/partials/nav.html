{{/*
  layouts/partials/nav.html
  모든 레이아웃 파일(index.html, posts/list.html, projects/list.html, tags/list.html)에서
  {{- partial "nav.html" . -}} 로 호출합니다.
*/}}

<!-- Search Overlay -->
<div class="custom-search-overlay" id="customSearchOverlay">
  <div class="custom-search-box">
    <div class="custom-search-input-wrap">
      <span class="custom-search-icon">🔍</span>
      <input class="custom-search-input" id="customSearchInput" placeholder="검색어를 입력하세요..." autocomplete="off">
      <span class="custom-search-esc" id="customSearchClose">ESC</span>
    </div>
    <div class="custom-search-results" id="customSearchResults">
      <div class="custom-search-empty">검색어를 입력하세요</div>
    </div>
  </div>
</div>

<!-- Custom Nav -->
<nav class="custom-nav">
  <a href="{{ "/" | relURL }}" class="nav-logo"><span>$</span> SongChaeYoung<span>.dev</span></a>
  <ul class="nav-links">
    <li><a href="{{ "/posts/"    | relURL }}">Posts</a></li>
    <li><a href="{{ "/projects/" | relURL }}">Projects</a></li>
    <li><a href="{{ "/tags/"     | relURL }}">Tags</a></li>
  </ul>
  <div class="nav-right">
    <button class="btn-search" id="customSearchBtn">⌘ Search</button>
    <button id="custom-theme-toggle" title="테마 전환">🌙</button>
  </div>
</nav>

<script>
(function () {
  var html = document.documentElement;

  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    localStorage.setItem('pref-theme', t);
    var btn = document.getElementById('custom-theme-toggle');
    if (btn) btn.textContent = t === 'dark' ? '🌙' : '☀️';
  }

  // 초기 테마 적용
  var saved = localStorage.getItem('theme') || localStorage.getItem('pref-theme') || 'dark';
  applyTheme(saved);

  document.addEventListener('DOMContentLoaded', function () {
    // theme 버튼
    var themeBtn = document.getElementById('custom-theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function () {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    }

    // 현재 페이지 nav 하이라이트
    document.querySelectorAll('nav.custom-nav ul.nav-links a').forEach(function (a) {
      var href = a.getAttribute('href');
      if (href && href !== '/' && window.location.pathname.startsWith(href)) {
        a.classList.add('nav-active');
      }
    });

    // 검색
    var overlay  = document.getElementById('customSearchOverlay');
    var input    = document.getElementById('customSearchInput');
    var results  = document.getElementById('customSearchResults');
    var openBtn  = document.getElementById('customSearchBtn');
    var closeBtn = document.getElementById('customSearchClose');

    function openSearch()  {
      if (overlay) { overlay.classList.add('open'); if (input) input.focus(); }
    }
    function closeSearch() {
      if (overlay) {
        overlay.classList.remove('open');
        if (input) input.value = '';
        if (results) results.innerHTML = '<div class="custom-search-empty">검색어를 입력하세요</div>';
      }
    }

    if (openBtn)  openBtn.addEventListener('click', openSearch);
    if (closeBtn) closeBtn.addEventListener('click', closeSearch);
    if (overlay)  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeSearch(); });

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
      if (e.key === 'Escape') closeSearch();
    });

    if (input) {
      input.addEventListener('input', function () {
        var q = input.value.trim().toLowerCase();
        if (!q) {
          results.innerHTML = '<div class="custom-search-empty">검색어를 입력하세요</div>';
          return;
        }
        var data = window.__searchData || [];
        var filtered = data.filter(function (p) {
          return p.title.toLowerCase().includes(q) || (p.desc && p.desc.toLowerCase().includes(q));
        });
        if (!filtered.length) {
          results.innerHTML = '<div class="custom-search-empty">검색 결과가 없습니다.</div>';
          return;
        }
        results.innerHTML = filtered.map(function (p) {
          return '<a href="' + p.url + '" class="custom-search-result-item">'
            + '<div class="custom-sr-title">' + p.title + '</div>'
            + '<div class="custom-sr-desc">' + (p.desc || '') + '</div>'
            + '<div style="font-family:\'JetBrains Mono\',monospace;font-size:.63rem;color:var(--muted);margin-top:.3rem">'
            + (p.date || '') + ' · ' + (p.type || '') + '</div>'
            + '</a>';
        }).join('');
      });
    }
  });
})();
</script>
