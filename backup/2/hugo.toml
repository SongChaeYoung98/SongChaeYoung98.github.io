baseURL = "https://SongChaeYoung98.github.io/"
languageCode = "ko"
title = "SongChaeYoung.dev"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "SongChaeYoung.dev"
  description = "кё°нҡҚл¶Җн„° л°°нҸ¬к№Ңм§Җ, к°ңл°ңмқҳ лӘЁл“  нқ”м Ғ"
