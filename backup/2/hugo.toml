  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/SongChaeYoung98"

  [params.assets]
    disableHLJS = false
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"
    safari_pinned_tab = "/safari-pinned-tab.svg"
    # м»ӨмҠӨн…Җ CSS м Ғмҡ©
    customCSS = ["css/custom.css"]

  [params.label]
    text = "SongChaeYoung.dev"
    icon = ""
    iconHeight = 35

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/SongChaeYoung98/SongChaeYoung98.github.io/edit/main/content"
    Text = "Edit"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    # лқјмқҙнҠё: нҒ¬лҰј нҺҳмқҙнҚј / лӢӨнҒ¬: лӘЁл…ёнҒ¬лЎ¬ м Җл„җ лӘЁл‘җ мһҳ м–ҙмҡёлҰ¬лҠ” мҠӨнғҖмқј
    style = "monokailight"
