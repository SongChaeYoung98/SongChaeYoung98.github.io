baseURL = "https://SongChaeYoung98.github.io/"
languageCode = "ko"
title = "SongChaeYoung.dev"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableGitInfo = true

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "SongChaeYoung.dev"
  description = "AI-era engineering notes, product experiments, and production-grade development logs."
  keywords = ["Backend", "System Design", "DevLog", "Architecture", "AI", "Web"]
  author = "SongChaeYoung"
  DateFormat = "2006. 01. 02"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.label]
    text = "SongChaeYoung.dev"
    icon = ""
    iconHeight = 35

  [params.assets]
    disableHLJS = false
    favicon = "/favicon.ico"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/SongChaeYoung98/SongChaeYoung98.github.io/edit/main/content"
    Text = "Edit"
    appendFilePath = true

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/SongChaeYoung98"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "base16-snazzy"

[frontmatter]
  lastmod = ["lastmod", ":git", "date"]
